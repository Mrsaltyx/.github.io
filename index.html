<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thomas Thouvenin - Data Analyst & Ingénieur IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #818CF8;
            --primary-dark: #6366F1;
            --accent: #A855F7;
            --bg-dark: #0F172A;
            --bg-card: #1E293B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: #E2E8F0;
            overflow-x: hidden;
        }
        .bg-grid {
            background-image: linear-gradient(rgba(129, 140, 248, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(129, 140, 248, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(129, 140, 248, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #818CF8 0%, #A855F7 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* SLIDER LOGIC */
        .projects-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1.5rem;
            padding: 1rem 0 2rem 0;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE */
        }
        .projects-container::-webkit-scrollbar { display: none; }
        
        .project-item {
            flex: 0 0 100%;
            scroll-snap-align: start;
        }
        @media (min-width: 768px) { .project-item { flex: 0 0 calc(50% - 0.75rem); } }
        @media (min-width: 1024px) { .project-item { flex: 0 0 calc(33.333% - 1rem); } }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 400px; height: 400px; background: #6366F1; top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #EC4899; bottom: 10%; left: -50px; }

        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        .nav-link.active::after { transform: translateX(0); }
        .nav-link::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, #818CF8, #A855F7);
            transform: translateX(-101%); transition: transform 0.3s ease;
        }
        .loader {
            width: 40px; height: 40px; border: 3px solid rgba(129, 140, 248, 0.2);
            border-top-color: #818CF8; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 bg-noise">
    <div class="fixed inset-0 bg-grid pointer-events-none"></div>

    <header class="fixed top-0 left-0 right-0 z-50 glass border-b border-indigo-500/20">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#home" class="text-2xl font-black gradient-text">TT</a>
            <div class="hidden md:flex space-x-8" id="desktop-nav">
                <a href="#about" class="nav-link relative overflow-hidden text-slate-300 hover:text-white transition-colors py-1">À Propos</a>
                <a href="#skills" class="nav-link relative overflow-hidden text-slate-300 hover:text-white transition-colors py-1">Compétences</a>
                <a href="#projects" class="nav-link relative overflow-hidden text-slate-300 hover:text-white transition-colors py-1">Projets</a>
                <a href="#contact" class="nav-link relative overflow-hidden text-slate-300 hover:text-white transition-colors py-1">Contact</a>
            </div>
            <button id="menu-btn" class="md:hidden text-indigo-400"><i data-lucide="menu"></i></button>
        </nav>
    </header>

    <section id="home" class="min-h-screen flex items-center justify-center relative pt-20">
        <div class="orb orb-1"></div>
        <div class="relative z-10 text-center px-4">
            <div class="mb-8 scale-in animate-scale-in">
                <img src="https://placehold.co/150x150/4F46E5/ffffff?text=TT" alt="Thomas" class="w-32 h-32 rounded-full border-4 border-indigo-500/30 mx-auto shadow-2xl">
            </div>
            <h1 class="text-5xl md:text-7xl font-black text-white mb-6">Thomas <span class="gradient-text">Thouvenin</span></h1>
            <p class="text-xl text-slate-400 max-w-2xl mx-auto mb-10">Data Analyst chez <span class="text-indigo-400">Amundi</span> & futur Ingénieur IA.</p>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="#projects" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-full font-bold transition-all shadow-lg shadow-indigo-500/20">Voir mes projets</a>
                <a href="https://github.com/Mrsaltyx" target="_blank" class="glass text-white px-8 py-4 rounded-full font-bold hover:bg-indigo-500/10 transition-all border border-indigo-500/30">GitHub</a>
            </div>
        </div>
    </section>

    <section id="projects" class="py-24 relative overflow-hidden">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-end mb-12 reveal">
                <div>
                    <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">Mes Réalisations</h2>
                    <p class="text-slate-400">Défilez pour explorer l'ensemble de mes travaux GitHub.</p>
                </div>
                <div class="flex gap-2 mb-2">
                    <button id="prev" class="p-3 rounded-xl glass border border-indigo-500/30 text-indigo-400 hover:bg-indigo-500/20 transition-all"><i data-lucide="chevron-left"></i></button>
                    <button id="next" class="p-3 rounded-xl glass border border-indigo-500/30 text-indigo-400 hover:bg-indigo-500/20 transition-all"><i data-lucide="chevron-right"></i></button>
                </div>
            </div>

            <div id="github-projects" class="projects-container reveal">
                <div class="w-full flex flex-col items-center py-20">
                    <div class="loader"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="py-24 glass border-t border-indigo-500/10">
        <div class="max-w-4xl mx-auto text-center px-6 reveal">
            <h2 class="text-3xl font-bold text-white mb-8">On travaille ensemble ?</h2>
            <div class="flex justify-center gap-6">
                <a href="https://www.linkedin.com/in/thomas-thouvenin-755743292/" target="_blank" class="flex items-center text-slate-300 hover:text-indigo-400 transition-colors"><i data-lucide="linkedin" class="mr-2"></i> LinkedIn</a>
                <a href="mailto:contact@votremail.com" class="flex items-center text-slate-300 hover:text-indigo-400 transition-colors"><i data-lucide="mail" class="mr-2"></i> Email</a>
            </div>
        </div>
    </section>

    <script>
        lucide.createIcons();

        // 1. GITHUB API & SLIDER GENERATION
        async function loadProjects() {
            const container = document.getElementById('github-projects');
            try {
                // On récupère tous les repos (max 100 par page)
                const response = await fetch('https://api.github.com/users/Mrsaltyx/repos?sort=updated&per_page=100');
                const repos = await response.json();
                
                const filteredRepos = repos.filter(repo => !repo.fork);
                
                container.innerHTML = filteredRepos.map(repo => `
                    <div class="project-item">
                        <div class="glass p-8 rounded-3xl border border-slate-700/50 h-full flex flex-col hover:border-indigo-500/50 transition-all group">
                            <div class="flex justify-between items-start mb-6">
                                <div class="p-3 bg-indigo-500/10 rounded-2xl text-indigo-400"><i data-lucide="folder"></i></div>
                                <a href="${repo.html_url}" target="_blank" class="text-slate-500 hover:text-indigo-400"><i data-lucide="external-link"></i></a>
                            </div>
                            <h3 class="text-xl font-bold text-white mb-3 group-hover:text-indigo-400 transition-colors">${repo.name.replace(/-/g, ' ')}</h3>
                            <p class="text-slate-400 text-sm leading-relaxed mb-6 flex-grow">
                                ${repo.description || "Projet axé sur l'analyse de données et l'implémentation de solutions algorithmiques."}
                            </p>
                            <div class="flex items-center gap-4 text-xs font-mono text-indigo-300">
                                <span class="flex items-center"><span class="w-2 h-2 rounded-full bg-indigo-500 mr-2"></span>${repo.language || 'Code'}</span>
                                <span class="flex items-center"><i data-lucide="star" class="w-3 h-3 mr-1"></i>${repo.stargazers_count}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                lucide.createIcons();
            } catch (e) {
                container.innerHTML = `<p class="text-red-400">Erreur de chargement des projets GitHub.</p>`;
            }
        }

        // 2. SLIDER NAVIGATION
        const container = document.getElementById('github-projects');
        document.getElementById('next').onclick = () => container.scrollBy({ left: container.offsetWidth, behavior: 'smooth' });
        document.getElementById('prev').onclick = () => container.scrollBy({ left: -container.offsetWidth, behavior: 'smooth' });

        // 3. REVEAL ANIMATION
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // 4. NAV ACTIVE STATE
        window.addEventListener('scroll', () => {
            let current = "";
            document.querySelectorAll('section').forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - 100) current = section.getAttribute('id');
            });
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href').includes(current)) link.classList.add('active');
            });
        });

        loadProjects();
    </script>
</body>
</html>
